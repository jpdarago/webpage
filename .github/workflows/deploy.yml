name: Deploy webpage
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.WEBSITE_DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add known host
        run: ssh-keyscan -H ${{ secrets.WEBSITE_DEPLOY_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -az ./ \
            ${{ secrets.WEBSITE_DEPLOY_SSH_USER }}@${{ secrets.WEBSITE_DEPLOY_SSH_HOST }}:/var/www/html
